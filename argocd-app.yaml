apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-lifecycle-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ankushthevar/devops-lifecycle-project
    targetRevision: master
    path: helm/charts/app
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: image.repository
          value: devops-app
        - name: image.tag
          value: local
        - name: image.pullPolicy
          value: Never
        - name: environment
          value: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: myapp
  syncPolicy:
    automated:
      prune: true        # delete resources removed from git
      selfHeal: true     # revert manual kubectl changes automatically
    syncOptions:
      - CreateNamespace=true
